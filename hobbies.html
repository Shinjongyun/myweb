<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I AM | Hobbies</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white">

    <nav class="fixed w-full z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter text-orange-500">I AM.</h1>
            <div class="flex space-x-8 text-sm font-bold uppercase tracking-widest">
                <a href="index.html" class="hover:text-orange-500 transition">Home</a>
                <a href="hobbies.html" class="text-orange-500 border-b-2 border-orange-500 pb-1">Hobbies</a>
                <a href="game.html" class="hover:text-purple-500 transition">Gaming</a>
                <a href="travel.html" class="hover:text-teal-500 transition">Travel</a>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 max-w-6xl mx-auto px-6">
        <h3 class="text-5xl font-black mb-16 italic text-orange-500">BASKETBALL</h3>
        <div class="grid md:grid-cols-2 gap-16 items-center">
            <div>
                <h4 class="text-3xl font-bold mb-4">Position: <span class="underline decoration-orange-500">Point Guard</span></h4>
                <p class="text-slate-400 text-lg leading-relaxed mb-12">직접 코트에서 뛰는 것도 좋아하지만, NBA 경기를 보며 전술을 분석하는 열혈 팬이기도 합니다. 포인트 가드로서의 움직임과 프로들의 화려한 플레이를 모두 사랑합니다.</p>
                <img src="https://www.pngarts.com/files/12/NBA-Logo-PNG-Transparent-Image.png" alt="NBA Logo" class="w-72 h-auto">
            </div>
            <div class="flex flex-col gap-6">
                <video src="https://i.namu.wiki/i/wDLhNmhZ_aSv3c_ZlVK-SQ6KLwAm0BAmBBFe1caFK1mUg88t2FJLCWSeD55mW8NWOysBIngL5qzNQdeHSKaF7Q.mp4" autoplay muted loop playsinline class="rounded-3xl shadow-2xl"></video>
                <img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExOWZzd2g3emFtZjRoOTNnZWg4dThpdzhmc3BqbHUycmtqanVlM3RlYSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/rBVM213ASKBIk/giphy.gif" class="rounded-3xl shadow-2xl" alt="NBA GIF">
            </div>
        </div>
    </main>

    <script>
        const pages = ['index.html', 'hobbies.html', 'game.html', 'travel.html'];
        let isNavigating = false;

        window.addEventListener('wheel', (e) => {
            if (isNavigating) return;
            const isAtBottom = (window.innerHeight + window.scrollY) >= (document.body.offsetHeight - 50);
            const isAtTop = window.scrollY <= 0;
            const currentPage = window.location.pathname.split('/').pop() || 'index.html';
            const currentIndex = pages.indexOf(currentPage);

            if (e.deltaY > 0 && isAtBottom) {
                isNavigating = true;
                window.location.href = pages[(currentIndex + 1) % pages.length];
            } else if (e.deltaY < 0 && isAtTop) {
                isNavigating = true;
                window.location.href = pages[(currentIndex - 1 + pages.length) % pages.length];
            }
        });
    </script>
</body>
</html>
