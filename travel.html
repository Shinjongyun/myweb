<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I AM | Travel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; opacity: 0; transition: opacity 0.5s ease-in-out; }
        .travel-container { display: flex; width: 100%; height: 500px; gap: 0.5rem; transition: all 0.5s ease; }
        .travel-card { flex: 1; transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1); overflow: hidden; position: relative; cursor: pointer; border-radius: 1rem; }
        .overlay-dim { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.7); transition: opacity 0.5s ease; opacity: 1; }
        .title-only { opacity: 1; transition: opacity 0.3s ease; }
        .content-overlay { opacity: 0; transition: opacity 0.3s ease; }
        .travel-container:hover .travel-card .overlay-dim { opacity: 0.6; }
        .travel-container:hover .travel-card:hover .overlay-dim { opacity: 0; }
        .travel-container:hover .travel-card .title-only { opacity: 0; }
        .travel-container:hover .travel-card:hover .content-overlay { opacity: 1; }
        .travel-container:hover .travel-card { flex: 0.5; }
        .travel-container:hover .travel-card:hover { flex: 4; }
    </style>
</head>
<body class="bg-slate-950 text-white">

    <nav class="fixed w-full z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter text-orange-500">I AM.</h1>
            <div class="flex space-x-8 text-sm font-bold uppercase tracking-widest">
                <a href="index.html" class="hover:text-orange-500 transition">Home</a>
                <a href="hobbies.html" class="hover:text-orange-500 transition">Hobbies</a>
                <a href="game.html" class="hover:text-purple-500 transition">Gaming</a>
                <a href="travel.html" class="text-teal-500 border-b-2 border-teal-500 pb-1">Travel</a>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 max-w-6xl mx-auto px-6">
        <h3 class="text-5xl font-black mb-16 italic text-teal-500">TRAVEL FOOTPRINTS</h3>
        <div class="travel-container">
            <div class="travel-card"><img src="https://media.triple.guide/triple-cms/c_limit,f_auto,h_1024,w_1024/09fa683d-8c7e-4ffe-9a58-366957d97579.jpeg" class="w-full h-full object-cover"><div class="overlay-dim"></div><div class="absolute inset-0 flex items-center justify-center title-only"><p class="font-bold text-4xl">TOKYO</p></div><div class="absolute inset-0 p-8 flex flex-col justify-end content-overlay"><p class="font-bold text-3xl text-teal-400">TOKYO</p><p class="mt-4">과거와 미래가 공존하는 도시.</p></div></div>
            <div class="travel-card"><img src="https://assets.travelodgehotels.asia/cdn-cgi/image/width=1920,quality=75,format=auto,height=1289,fit=crop/5%20Top%20Attractions%20in%20Nagoya%20for%20Your%20Next%20Adventure.png" class="w-full h-full object-cover"><div class="overlay-dim"></div><div class="absolute inset-0 flex items-center justify-center title-only"><p class="font-bold text-4xl">NAGOYA</p></div><div class="absolute inset-0 p-8 flex flex-col justify-end content-overlay"><p class="font-bold text-3xl text-teal-400">NAGOYA</p><p class="mt-4">역사가 깊은 평온한 도시.</p></div></div>
            <div class="travel-card"><img src="https://images.unsplash.com/photo-1528127269322-539801943592?q=80&w=600&auto=format&fit=crop" class="w-full h-full object-cover"><div class="overlay-dim"></div><div class="absolute inset-0 flex items-center justify-center title-only"><p class="font-bold text-4xl">VIETNAM</p></div><div class="absolute inset-0 p-8 flex flex-col justify-end content-overlay"><p class="font-bold text-3xl text-teal-400">VIETNAM</p><p class="mt-4">커피와 자연의 에너지.</p></div></div>
            <div class="travel-card"><img src="https://pimg.mk.co.kr/meet/neds/2022/02/image_readtop_2022_130158_16455143614940945.jpg" class="w-full h-full object-cover"><div class="overlay-dim"></div><div class="absolute inset-0 flex items-center justify-center title-only"><p class="font-bold text-4xl">THAILAND</p></div><div class="absolute inset-0 p-8 flex flex-col justify-end content-overlay"><p class="font-bold text-3xl text-teal-400">THAILAND</p><p class="mt-4">찬란한 사원과 해변.</p></div></div>
            <div class="travel-card"><img src="https://www.morningfocus.net/news/photo/202304/1247_1607_429.jpg" class="w-full h-full object-cover"><div class="overlay-dim"></div><div class="absolute inset-0 flex items-center justify-center title-only"><p class="font-bold text-4xl">SINGAPORE</p></div><div class="absolute inset-0 p-8 flex flex-col justify-end content-overlay"><p class="font-bold text-3xl text-teal-400">SINGAPORE</p><p class="mt-4">깨끗한 미래 도시.</p></div></div>
        </div>
    </main>

    <script>
        window.onload = () => { document.body.style.opacity = '1'; };
        const pages = ['index.html', 'hobbies.html', 'game.html', 'travel.html'];
        window.addEventListener('click', (e) => {
            if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.closest('a') || e.target.closest('button')) return;
            const currentPage = window.location.pathname.split('/').pop() || 'index.html';
            const currentIndex = pages.indexOf(currentPage);
            const targetPage = e.clientX > window.innerWidth / 2 ? pages[(currentIndex + 1) % pages.length] : pages[(currentIndex - 1 + pages.length) % pages.length];
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = targetPage; }, 500);
        });
    </script>
</body>
</html>
