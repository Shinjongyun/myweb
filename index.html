<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I AM | Interactive Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; opacity: 0; transition: opacity 0.5s ease-in-out; }
        .hero-bg {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), url('https://images.unsplash.com/photo-1504450758481-7338eba7524a?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="bg-slate-950 text-white">

    <nav class="fixed w-full z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter text-orange-500">I AM.</h1>
            <div class="flex space-x-8 text-sm font-bold uppercase tracking-widest">
                <a href="index.html" class="text-orange-500 border-b-2 border-orange-500 pb-1">Home</a>
                <a href="hobbies.html" class="hover:text-orange-500 transition">Hobbies</a>
                <a href="game.html" class="hover:text-purple-500 transition">Gaming</a>
                <a href="travel.html" class="hover:text-teal-500 transition">Travel</a>
            </div>
        </div>
    </nav>

    <header class="hero-bg min-h-screen flex flex-col justify-center items-center text-center px-6">
        <h2 class="text-5xl md:text-7xl font-black mb-6 tracking-wide italic px-8">
            PLAY MY 
            <span class="inline-block pr-4 -mr-4 text-transparent bg-clip-text bg-gradient-to-r from-orange-400 via-purple-400 to-teal-400">
                WAY
            </span>
        </h2>
        <p class="text-slate-300 text-xl md:text-2xl max-w-3xl font-light">스포츠부터 게임까지, 나를 정의하는 모든 것.</p>
    </header>

    <footer class="py-20 text-center border-t border-slate-900">
        <p class="text-slate-500 uppercase tracking-widest text-sm">© 2024 I AM PROJECT. BUILD YOUR OWN WORLD.</p>
    </footer>

    <script>
        window.onload = () => { document.body.style.opacity = '1'; };

        const pages = ['index.html', 'hobbies.html', 'game.html', 'travel.html'];
        
        window.addEventListener('click', (e) => {
            if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.closest('a') || e.target.closest('button')) return;

            const currentPage = window.location.pathname.split('/').pop() || 'index.html';
            const currentIndex = pages.indexOf(currentPage);
            let targetPage = '';

            if (e.clientX > window.innerWidth / 2) {
                targetPage = pages[(currentIndex + 1) % pages.length];
            } else {
                targetPage = pages[(currentIndex - 1 + pages.length) % pages.length];
            }

            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = targetPage; }, 500);
        });
    </script>
</body>
</html>
