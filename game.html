<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I AM | Gaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .interactive-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .interactive-card:hover { transform: scale(1.05); z-index: 10; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="bg-slate-950 text-white">

    <nav class="fixed w-full z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter text-orange-500">I AM.</h1>
            <div class="flex space-x-8 text-sm font-bold uppercase tracking-widest">
                <a href="index.html" class="hover:text-orange-500 transition">Home</a>
                <a href="hobbies.html" class="hover:text-orange-500 transition">Hobbies</a>
                <a href="game.html" class="text-purple-500 border-b-2 border-purple-500 pb-1">Gaming</a>
                <a href="travel.html" class="hover:text-teal-500 transition">Travel</a>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 max-w-6xl mx-auto px-6">
        <h3 class="text-5xl font-black mb-16 italic text-purple-500">MY GAMING ARENA</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="interactive-card bg-slate-800 p-6 rounded-2xl">
                <img src="https://cloudfront-us-east-1.images.arcpublishing.com/infobae/YABJ7CAXOZDVHAXSDRSQQ7NJR4.jpg" class="mb-4 rounded-xl h-48 w-full object-cover">
                <h5 class="font-bold text-xl">LoL: 전략의 재미</h5>
            </div>
            <div class="interactive-card bg-slate-800 p-6 rounded-2xl">
                <img src="https://yt3.googleusercontent.com/fBeiPYv-OCQ4AZgTGSBy7tRzmHe9KwRkpHfnmv1pRX2SmxrVxI7dKEXIco_zWKNfReCvptj9Lg=s900-c-k-c0x00ffffff-no-rj" class="mb-4 rounded-xl h-48 w-full object-cover">
                <h5 class="font-bold text-xl">Clash Royale</h5>
            </div>
            <div class="interactive-card bg-slate-800 p-6 rounded-2xl">
                <img src="https://images.unsplash.com/photo-1613771404721-1f92d799e49f?q=80&w=800&auto=format&fit=crop" class="mb-4 rounded-xl h-48 w-full object-cover">
                <h5 class="font-bold text-xl">Pokémon</h5>
            </div>
        </div>
    </main>

    <script>
        const pages = ['index.html', 'hobbies.html', 'game.html', 'travel.html'];
        let isNavigating = false;

        window.addEventListener('wheel', (e) => {
            if (isNavigating) return;
            const isAtBottom = (window.innerHeight + window.scrollY) >= (document.body.offsetHeight - 50);
            const isAtTop = window.scrollY <= 0;
            const currentPage = window.location.pathname.split('/').pop() || 'index.html';
            const currentIndex = pages.indexOf(currentPage);

            if (e.deltaY > 0 && isAtBottom) {
                isNavigating = true;
                window.location.href = pages[(currentIndex + 1) % pages.length];
            } else if (e.deltaY < 0 && isAtTop) {
                isNavigating = true;
                window.location.href = pages[(currentIndex - 1 + pages.length) % pages.length];
            }
        });
    </script>
</body>
</html>
